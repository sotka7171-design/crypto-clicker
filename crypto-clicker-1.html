<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MOONBIT — Tap to Earn</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C842;
    --gold2: #FFE97A;
    --bg: #090b14;
    --bg2: #0d1020;
    --surface: #131729;
    --surface2: #1a1f35;
    --accent: #7B61FF;
    --accent2: #A48FFF;
    --green: #00E5A0;
    --red: #FF4D6A;
    --text: #E8EAF6;
    --muted: #5a6080;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(123,97,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(245,200,66,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(0,229,160,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid lines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(123,97,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(123,97,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 420px;
    margin: 0 auto;
    padding: 16px 16px 100px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0 20px;
  }

  .logo {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--gold), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .level-badge {
    background: var(--surface);
    border: 1px solid rgba(123,97,255,0.3);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
  }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 12px 10px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent-line, var(--accent));
    opacity: 0.7;
  }

  .stat-card.gold-line { --accent-line: var(--gold); }
  .stat-card.green-line { --accent-line: var(--green); }
  .stat-card.purple-line { --accent-line: var(--accent); }

  .stat-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 15px;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Main coin */
  .coin-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 10px 0 20px;
    position: relative;
  }

  .coin-glow {
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,200,66,0.15) 0%, transparent 70%);
    animation: pulseGlow 2.5s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes pulseGlow {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  .coin-btn {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: none;
    background: conic-gradient(from 0deg, #F5C842, #FFD700, #FFC107, #FFE57A, #F5C842);
    position: relative;
    cursor: pointer;
    transition: transform 0.08s ease;
    box-shadow:
      0 0 40px rgba(245,200,66,0.25),
      0 0 80px rgba(245,200,66,0.1),
      inset 0 2px 6px rgba(255,255,255,0.3),
      inset 0 -2px 6px rgba(0,0,0,0.4);
    outline: none;
    z-index: 2;
  }

  .coin-btn:active { transform: scale(0.93); }

  .coin-inner {
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    background: conic-gradient(from 180deg, #E6B800, #F5C842, #FFD700, #E6B800);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.3), inset 0 -2px 4px rgba(255,255,255,0.2);
    animation: coinSpin 8s linear infinite;
  }

  @keyframes coinSpin {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.15); }
    100% { filter: brightness(1); }
  }

  .coin-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(245,200,66,0.3);
    animation: ringPulse 1.5s ease-in-out infinite;
  }

  .coin-ring2 {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    border: 1px solid rgba(245,200,66,0.15);
    animation: ringPulse 1.5s ease-in-out infinite 0.4s;
  }

  @keyframes ringPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.02); }
  }

  .tap-hint {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 18px;
    opacity: 0.7;
  }

  /* Floating +1 text */
  .float-text {
    position: fixed;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    color: var(--gold);
    pointer-events: none;
    animation: floatUp 1s ease-out forwards;
    z-index: 999;
    text-shadow: 0 0 10px rgba(245,200,66,0.5);
    font-size: 18px;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.7); }
  }

  /* Energy bar */
  .energy-section {
    margin-bottom: 20px;
  }

  .energy-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .energy-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .energy-count {
    font-size: 12px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    color: var(--green);
  }

  .energy-bar {
    height: 8px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(0,229,160,0.15);
  }

  .energy-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--green), #00FFC2);
    transition: width 0.3s ease;
    box-shadow: 0 0 8px rgba(0,229,160,0.4);
    position: relative;
  }

  .energy-fill::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Tab bar */
  .tab-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    background: var(--surface);
    padding: 5px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .tab-btn {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* Upgrades */
  .upgrades-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .upgrade-card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .upgrade-card:active { transform: scale(0.98); }

  .upgrade-card.can-afford {
    border-color: rgba(245,200,66,0.25);
  }

  .upgrade-card.can-afford::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(245,200,66,0.04), transparent);
  }

  .upgrade-card.maxed {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .upgrade-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .upgrade-info { flex: 1; min-width: 0; }

  .upgrade-name {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .upgrade-desc {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .upgrade-progress {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .upgrade-bar {
    flex: 1;
    height: 4px;
    background: var(--bg);
    border-radius: 2px;
    overflow: hidden;
  }

  .upgrade-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .upgrade-level-text {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    white-space: nowrap;
  }

  .upgrade-cost {
    text-align: right;
    flex-shrink: 0;
  }

  .upgrade-cost-val {
    font-size: 13px;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    color: var(--gold);
    display: block;
    margin-bottom: 2px;
  }

  .upgrade-cost-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Leaderboard */
  .leaderboard {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .leader-item {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .leader-rank {
    font-size: 14px;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .leader-rank.gold { color: #F5C842; }
  .leader-rank.silver { color: #C0C0C0; }
  .leader-rank.bronze { color: #CD7F32; }

  .leader-avatar {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .leader-name {
    flex: 1;
    font-weight: 700;
    font-size: 14px;
  }

  .leader-score {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--gold);
    font-weight: 700;
  }

  .leader-you {
    border-color: rgba(123,97,255,0.4);
    background: rgba(123,97,255,0.06);
  }

  /* Section title */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Notification toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--surface2);
    border: 1px solid rgba(0,229,160,0.3);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    z-index: 1000;
    transition: transform 0.3s ease;
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(13,16,32,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    border: none;
    background: none;
    cursor: pointer;
    padding: 6px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }

  .nav-btn.active { color: var(--gold); }
  .nav-btn .nav-icon { font-size: 20px; }

  /* Streaks / daily */
  .streak-banner {
    background: linear-gradient(135deg, rgba(245,200,66,0.12), rgba(123,97,255,0.08));
    border: 1px solid rgba(245,200,66,0.2);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .streak-icon { font-size: 28px; }

  .streak-text { flex: 1; }

  .streak-title {
    font-size: 13px;
    font-weight: 800;
    color: var(--gold);
    margin-bottom: 2px;
  }

  .streak-sub { font-size: 11px; color: var(--muted); }

  .streak-claim {
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .streak-claim:active { transform: scale(0.95); }
  .streak-claim:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Page sections */
  .page { display: none; }
  .page.active { display: block; }

  /* Combo indicator */
  .combo-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
    height: 24px;
  }

  .combo-text {
    font-size: 13px;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    color: var(--red);
    opacity: 0;
    transition: opacity 0.2s;
    text-shadow: 0 0 10px rgba(255,77,106,0.5);
  }

  .combo-text.show { opacity: 1; }

  /* Achievements */
  .achievement-list { display: flex; flex-direction: column; gap: 8px; }

  .achievement-item {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0.4;
    transition: opacity 0.3s;
  }

  .achievement-item.unlocked { opacity: 1; border-color: rgba(245,200,66,0.2); }

  .ach-icon { font-size: 28px; flex-shrink: 0; }
  .ach-info { flex: 1; }
  .ach-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .ach-desc { font-size: 11px; color: var(--muted); }
  .ach-reward { font-size: 12px; font-family: 'Space Mono', monospace; color: var(--gold); font-weight: 700; }

</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="wrapper">
  <div class="header">
    <div class="logo">⚡ MOONBIT</div>
    <div class="level-badge" id="levelBadge">LVL 1</div>
  </div>

  <!-- TAP PAGE -->
  <div class="page active" id="page-tap">

    <div class="stats-bar">
      <div class="stat-card gold-line">
        <div class="stat-label">Баланс</div>
        <div class="stat-value" id="balanceDisplay">0</div>
      </div>
      <div class="stat-card green-line">
        <div class="stat-label">За тап</div>
        <div class="stat-value" id="perTapDisplay">+1</div>
      </div>
      <div class="stat-card purple-line">
        <div class="stat-label">В час</div>
        <div class="stat-value" id="perHourDisplay">0/h</div>
      </div>
    </div>

    <div class="combo-bar">
      <div class="combo-text" id="comboText">🔥 COMBO x<span id="comboVal">1</span></div>
    </div>

    <div class="coin-section">
      <div class="coin-glow"></div>
      <button class="coin-btn" id="coinBtn" onclick="handleTap(event)">
        <div class="coin-ring"></div>
        <div class="coin-ring2"></div>
        <div class="coin-inner">🪙</div>
      </button>
      <div class="tap-hint">Тапай чтобы добывать</div>
    </div>

    <div class="energy-section">
      <div class="energy-header">
        <div class="energy-label">⚡ Энергия</div>
        <div class="energy-count" id="energyCount">500 / 500</div>
      </div>
      <div class="energy-bar">
        <div class="energy-fill" id="energyFill" style="width:100%"></div>
      </div>
    </div>

    <div class="streak-banner">
      <div class="streak-icon">🔥</div>
      <div class="streak-text">
        <div class="streak-title">Ежедневный бонус</div>
        <div class="streak-sub">Серия: <span id="streakDays">1</span> дней подряд</div>
      </div>
      <button class="streak-claim" id="streakBtn" onclick="claimStreak()">+500</button>
    </div>

  </div>

  <!-- UPGRADES PAGE -->
  <div class="page" id="page-upgrades">
    <div class="section-title">🚀 Улучшения</div>
    <div class="upgrades-grid" id="upgradesGrid"></div>
  </div>

  <!-- LEADERBOARD PAGE -->
  <div class="page" id="page-leaders">
    <div class="section-title">🏆 Топ игроков</div>
    <div class="leaderboard" id="leaderboard"></div>
  </div>

  <!-- ACHIEVEMENTS PAGE -->
  <div class="page" id="page-ach">
    <div class="section-title">🎖 Достижения</div>
    <div class="achievement-list" id="achList"></div>
  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchPage('tap', this)">
    <span class="nav-icon">🪙</span>Тапать
  </button>
  <button class="nav-btn" onclick="switchPage('upgrades', this)">
    <span class="nav-icon">⚡</span>Буст
  </button>
  <button class="nav-btn" onclick="switchPage('leaders', this)">
    <span class="nav-icon">🏆</span>Рейтинг
  </button>
  <button class="nav-btn" onclick="switchPage('ach', this)">
    <span class="nav-icon">🎖</span>Достижения
  </button>
</div>

<script>
// ===== GAME STATE =====
let state = {
  coins: 0,
  totalCoins: 0,
  energy: 500,
  maxEnergy: 500,
  level: 1,
  xp: 0,
  streak: 1,
  streakClaimed: false,
  combo: 1,
  comboTimer: null,
  lastTap: 0,
  upgrades: {
    tapPower:   { level: 0, maxLevel: 20 },
    energyMax:  { level: 0, maxLevel: 15 },
    recharge:   { level: 0, maxLevel: 15 },
    autoMiner:  { level: 0, maxLevel: 10 },
    comboBoost: { level: 0, maxLevel: 10 },
    luckyTap:   { level: 0, maxLevel: 8  },
    energySave: { level: 0, maxLevel: 8  },
  },
  achievements: {
    first100:   false,
    first1k:    false,
    first10k:   false,
    first100k:  false,
    tap100:     false,
    tap1000:    false,
    streak3:    false,
    streak7:    false,
    allUpgrades:false,
  },
  totalTaps: 0,
};

// ===== UPGRADE DEFINITIONS =====
const UPGRADES = [
  {
    id: 'tapPower',
    name: 'Сила тапа',
    desc: 'Монет за один тап',
    icon: '👆',
    color: '#F5C842',
    baseCost: 50,
    costMult: 2.1,
    effect: lvl => lvl,
    effectText: lvl => `+${lvl + 1} за тап`,
  },
  {
    id: 'energyMax',
    name: 'Макс. энергия',
    desc: 'Увеличивает максимум энергии',
    icon: '🔋',
    color: '#00E5A0',
    baseCost: 200,
    costMult: 2.5,
    effect: lvl => lvl * 100,
    effectText: lvl => `+${(lvl + 1) * 100} энергии`,
  },
  {
    id: 'recharge',
    name: 'Зарядка',
    desc: 'Скорость восстановления энергии',
    icon: '⚡',
    color: '#7B61FF',
    baseCost: 300,
    costMult: 2.4,
    effect: lvl => lvl,
    effectText: lvl => `${lvl + 1}/с восст.`,
  },
  {
    id: 'autoMiner',
    name: 'Авто-майнер',
    desc: 'Пассивный доход монет в час',
    icon: '🤖',
    color: '#FF4D6A',
    baseCost: 1000,
    costMult: 3.0,
    effect: lvl => lvl * 50,
    effectText: lvl => `+${(lvl + 1) * 50}/ч пассив`,
  },
  {
    id: 'comboBoost',
    name: 'Комбо мастер',
    desc: 'Умножитель комбо тапов',
    icon: '🔥',
    color: '#FF8C00',
    baseCost: 500,
    costMult: 2.8,
    effect: lvl => lvl * 0.2,
    effectText: lvl => `x${(1 + (lvl + 1) * 0.2).toFixed(1)} комбо`,
  },
  {
    id: 'luckyTap',
    name: 'Удачный тап',
    desc: 'Шанс получить x5 монет',
    icon: '🍀',
    color: '#00C853',
    baseCost: 800,
    costMult: 3.2,
    effect: lvl => lvl * 3,
    effectText: lvl => `${(lvl + 1) * 3}% шанс x5`,
  },
  {
    id: 'energySave',
    name: 'Экономия',
    desc: 'Шанс не тратить энергию',
    icon: '🛡',
    color: '#29B6F6',
    baseCost: 600,
    costMult: 2.9,
    effect: lvl => lvl * 4,
    effectText: lvl => `${(lvl + 1) * 4}% не тратить`,
  },
];

const ACHIEVEMENTS = [
  { id: 'first100',    icon: '🌱', name: 'Первые шаги',   desc: 'Накопи 100 монет',       reward: 50,    check: () => state.totalCoins >= 100 },
  { id: 'first1k',    icon: '💰', name: 'Тысячник',       desc: 'Накопи 1,000 монет',     reward: 200,   check: () => state.totalCoins >= 1000 },
  { id: 'first10k',   icon: '💎', name: 'Богач',          desc: 'Накопи 10,000 монет',    reward: 1000,  check: () => state.totalCoins >= 10000 },
  { id: 'first100k',  icon: '👑', name: 'Миллионер',      desc: 'Накопи 100,000 монет',   reward: 5000,  check: () => state.totalCoins >= 100000 },
  { id: 'tap100',     icon: '👆', name: 'Тапер',          desc: 'Сделай 100 тапов',       reward: 100,   check: () => state.totalTaps >= 100 },
  { id: 'tap1000',    icon: '⚡', name: 'Мастер тапа',    desc: 'Сделай 1,000 тапов',     reward: 500,   check: () => state.totalTaps >= 1000 },
  { id: 'streak3',    icon: '🔥', name: '3 дня подряд',   desc: 'Серия 3 дня',            reward: 300,   check: () => state.streak >= 3 },
  { id: 'streak7',    icon: '🌟', name: 'Неделя!',        desc: 'Серия 7 дней',           reward: 1000,  check: () => state.streak >= 7 },
];

// ===== HELPERS =====
function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return Math.floor(n).toString();
}

function getUpgradeCost(upg) {
  const def = UPGRADES.find(u => u.id === upg.id || u.id === upg);
  const lvl = state.upgrades[def.id].level;
  if (lvl >= def.maxLevel) return Infinity;
  return Math.floor(def.baseCost * Math.pow(def.costMult, lvl));
}

function getTapPower() {
  const base = 1 + state.upgrades.tapPower.level;
  return base;
}

function getMaxEnergy() {
  return 500 + state.upgrades.energyMax.level * 100;
}

function getRechargeRate() {
  return 1 + state.upgrades.recharge.level;
}

function getAutoMiner() {
  return state.upgrades.autoMiner.level * 50;
}

function getComboMult() {
  return 1 + state.upgrades.comboBoost.level * 0.2;
}

function getLuckyChance() {
  return state.upgrades.luckyTap.level * 3;
}

function getEnergySaveChance() {
  return state.upgrades.energySave.level * 4;
}

// ===== TAP =====
function handleTap(e) {
  if (state.energy <= 0) {
    showToast('⚡ Нет энергии! Подожди...');
    return;
  }

  // Energy save chance
  const saveRoll = Math.random() * 100;
  if (saveRoll >= getEnergySaveChance()) {
    state.energy = Math.max(0, state.energy - 1);
  }

  // Lucky tap
  let mult = 1;
  const luckyRoll = Math.random() * 100;
  if (luckyRoll < getLuckyChance()) {
    mult = 5;
    showToast('🍀 УДАЧА! x5 монет!');
  }

  // Combo
  const now = Date.now();
  if (now - state.lastTap < 800) {
    state.combo = Math.min(state.combo + 0.5, 5 * getComboMult());
  } else {
    state.combo = 1;
  }
  state.lastTap = now;

  if (state.comboTimer) clearTimeout(state.comboTimer);
  state.comboTimer = setTimeout(() => {
    state.combo = 1;
    updateComboDisplay();
  }, 1500);

  const earned = Math.floor(getTapPower() * mult * state.combo);
  state.coins += earned;
  state.totalCoins += earned;
  state.totalTaps++;

  // XP
  state.xp += 1;
  checkLevelUp();

  updateDisplay();
  spawnFloat(e, `+${formatNum(earned)}`);
  checkAchievements();
}

function updateComboDisplay() {
  const el = document.getElementById('comboText');
  const val = document.getElementById('comboVal');
  if (state.combo > 1.4) {
    val.textContent = state.combo.toFixed(1);
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}

function spawnFloat(e, text) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.left = (e.clientX - 20 + Math.random() * 30 - 15) + 'px';
  el.style.top = (e.clientY - 20) + 'px';
  if (text.includes('x5')) el.style.color = '#00E5A0';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ===== LEVEL UP =====
function checkLevelUp() {
  const needed = state.level * 50;
  if (state.xp >= needed) {
    state.xp -= needed;
    state.level++;
    showToast(`⬆️ Уровень ${state.level}! +200 монет бонус`);
    state.coins += 200;
    state.totalCoins += 200;
    document.getElementById('levelBadge').textContent = `LVL ${state.level}`;
  }
}

// ===== DISPLAY UPDATE =====
function updateDisplay() {
  document.getElementById('balanceDisplay').textContent = formatNum(state.coins);
  document.getElementById('perTapDisplay').textContent = `+${getTapPower()}`;
  const autoPerHour = getAutoMiner();
  document.getElementById('perHourDisplay').textContent = formatNum(autoPerHour) + '/h';
  document.getElementById('energyCount').textContent = `${Math.floor(state.energy)} / ${getMaxEnergy()}`;
  const pct = (state.energy / getMaxEnergy()) * 100;
  document.getElementById('energyFill').style.width = pct + '%';
  updateComboDisplay();
}

// ===== UPGRADES RENDER =====
function renderUpgrades() {
  const grid = document.getElementById('upgradesGrid');
  grid.innerHTML = '';
  UPGRADES.forEach(def => {
    const upg = state.upgrades[def.id];
    const cost = getUpgradeCost(def);
    const canAfford = state.coins >= cost;
    const isMaxed = upg.level >= def.maxLevel;
    const pct = (upg.level / def.maxLevel) * 100;

    const card = document.createElement('div');
    card.className = `upgrade-card${canAfford && !isMaxed ? ' can-afford' : ''}${isMaxed ? ' maxed' : ''}`;
    card.innerHTML = `
      <div class="upgrade-icon" style="background: ${def.color}22;">${def.icon}</div>
      <div class="upgrade-info">
        <div class="upgrade-name">${def.name}</div>
        <div class="upgrade-desc">${isMaxed ? '✅ Максимум' : def.effectText(upg.level)}</div>
        <div class="upgrade-progress">
          <div class="upgrade-bar"><div class="upgrade-bar-fill" style="width:${pct}%"></div></div>
          <div class="upgrade-level-text">${upg.level}/${def.maxLevel}</div>
        </div>
      </div>
      <div class="upgrade-cost">
        <span class="upgrade-cost-val">${isMaxed ? 'MAX' : formatNum(cost)}</span>
        <span class="upgrade-cost-label">${isMaxed ? '' : '🪙 монет'}</span>
      </div>
    `;
    if (!isMaxed) {
      card.onclick = () => buyUpgrade(def.id);
    }
    grid.appendChild(card);
  });
}

function buyUpgrade(id) {
  const def = UPGRADES.find(u => u.id === id);
  const cost = getUpgradeCost(def);
  if (state.coins < cost) {
    showToast(`❌ Нужно ещё ${formatNum(cost - state.coins)} монет`);
    return;
  }
  state.coins -= cost;
  state.upgrades[id].level++;

  // Update energy max
  state.maxEnergy = getMaxEnergy();
  if (state.energy > state.maxEnergy) state.energy = state.maxEnergy;

  showToast(`✅ ${def.name} улучшено до ур. ${state.upgrades[id].level}!`);
  updateDisplay();
  renderUpgrades();
  checkAchievements();
}

// ===== STREAK =====
function claimStreak() {
  if (state.streakClaimed) return;
  const reward = state.streak * 100 + 400;
  state.coins += reward;
  state.totalCoins += reward;
  state.streakClaimed = true;
  document.getElementById('streakBtn').disabled = true;
  document.getElementById('streakBtn').textContent = '✓';
  showToast(`🔥 Получено ${formatNum(reward)} монет! Серия: ${state.streak} дней`);
  updateDisplay();
}

// ===== LEADERBOARD =====
function renderLeaderboard() {
  const players = [
    { name: 'CryptoKing', score: 2840000, avatar: '👑' },
    { name: 'MoonWatcher', score: 1920000, avatar: '🌙' },
    { name: 'DiamondHands', score: 1540000, avatar: '💎' },
    { name: 'TapMaster99', score: 980000, avatar: '⚡' },
    { name: 'LuckyMiner', score: 720000, avatar: '🍀' },
    { name: 'Вы', score: state.totalCoins, avatar: '🎮', isYou: true },
    { name: 'SatoshiGhost', score: 430000, avatar: '👻' },
    { name: 'BlockchainBro', score: 210000, avatar: '🤖' },
  ];
  players.sort((a, b) => b.score - a.score);

  const el = document.getElementById('leaderboard');
  el.innerHTML = '';
  const rankClasses = ['gold', 'silver', 'bronze'];
  const medals = ['🥇', '🥈', '🥉'];

  players.slice(0, 8).forEach((p, i) => {
    const item = document.createElement('div');
    item.className = `leader-item${p.isYou ? ' leader-you' : ''}`;
    const rankClass = i < 3 ? rankClasses[i] : '';
    item.innerHTML = `
      <div class="leader-rank ${rankClass}">${i < 3 ? medals[i] : (i + 1)}</div>
      <div class="leader-avatar" style="background:${p.isYou ? 'rgba(123,97,255,0.2)' : 'rgba(255,255,255,0.05)'};">${p.avatar}</div>
      <div class="leader-name">${p.name}${p.isYou ? ' (вы)' : ''}</div>
      <div class="leader-score">${formatNum(p.score)}</div>
    `;
    el.appendChild(item);
  });
}

// ===== ACHIEVEMENTS =====
function checkAchievements() {
  ACHIEVEMENTS.forEach(ach => {
    if (!state.achievements[ach.id] && ach.check()) {
      state.achievements[ach.id] = true;
      state.coins += ach.reward;
      state.totalCoins += ach.reward;
      showToast(`🎖 Достижение: ${ach.name}! +${formatNum(ach.reward)} монет`);
    }
  });
  renderAchievements();
}

function renderAchievements() {
  const el = document.getElementById('achList');
  el.innerHTML = '';
  ACHIEVEMENTS.forEach(ach => {
    const unlocked = state.achievements[ach.id];
    const item = document.createElement('div');
    item.className = `achievement-item${unlocked ? ' unlocked' : ''}`;
    item.innerHTML = `
      <div class="ach-icon">${unlocked ? ach.icon : '🔒'}</div>
      <div class="ach-info">
        <div class="ach-name">${ach.name}</div>
        <div class="ach-desc">${ach.desc}</div>
      </div>
      <div class="ach-reward">+${formatNum(ach.reward)} 🪙</div>
    `;
    el.appendChild(item);
  });
}

// ===== NAVIGATION =====
function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');

  if (name === 'upgrades') renderUpgrades();
  if (name === 'leaders') renderLeaderboard();
  if (name === 'ach') renderAchievements();
}

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== AUTO REGEN =====
setInterval(() => {
  // Energy recharge
  if (state.energy < getMaxEnergy()) {
    state.energy = Math.min(state.energy + getRechargeRate(), getMaxEnergy());
  }
  // Auto miner
  const autoCoins = getAutoMiner() / 3600;
  if (autoCoins > 0) {
    state.coins += autoCoins;
    state.totalCoins += autoCoins;
  }
  updateDisplay();
}, 1000);

// Update leaderboard every 5s
setInterval(() => {
  if (document.getElementById('page-leaders').classList.contains('active')) {
    renderLeaderboard();
  }
}, 5000);

// ===== INIT =====
updateDisplay();
renderAchievements();

// Streak button text
const streakReward = state.streak * 100 + 400;
document.getElementById('streakBtn').textContent = `+${streakReward}`;
document.getElementById('streakDays').textContent = state.streak;
</script>
</body>
</html>
